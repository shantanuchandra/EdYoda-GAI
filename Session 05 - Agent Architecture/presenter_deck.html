<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenter · GenAI for Non-Coders · Session 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #07090f;
    --bg-1: #0d111a;
    --bg-2: #131826;

    --surface: rgba(255, 255, 255, 0.03);
    --surface-hover: rgba(255, 255, 255, 0.05);
    --surface-strong: rgba(255, 255, 255, 0.06);

    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);

    --text: #f4f6fb;
    --text-soft: #c9d0de;
    --text-muted: #8993a6;
    --text-dim: #5a6377;

    --accent: #5eead4;
    --accent-soft: rgba(94, 234, 212, 0.14);
    --accent-line: rgba(94, 234, 212, 0.35);
    --warm: #fbbf24;
    --warm-soft: rgba(251, 191, 36, 0.12);
    --hot: #fb7185;
    --hot-soft: rgba(251, 113, 133, 0.12);
    --green: #4ade80;
    --green-soft: rgba(74, 222, 128, 0.12);
    --purple: #a78bfa;
    --purple-soft: rgba(167, 139, 250, 0.12);

    --s-1: 8px;  --s-2: 16px;  --s-3: 24px;  --s-4: 32px;

    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --dur-fast: 180ms;
    --dur-med: 280ms;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-0);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-feature-settings: 'cv02', 'cv03', 'cv11', 'ss01';
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ===================== TOPBAR ===================== */
  .topbar {
    height: 64px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 var(--s-3);
    gap: var(--s-3);
    flex-shrink: 0;
  }
  .topbar .title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-size: 0.72rem;
    text-transform: uppercase;
  }
  .topbar .title .accent { color: var(--accent); }
  .clock-divider { width: 1px; height: 32px; background: var(--border); }
  .clock-box { display: flex; flex-direction: column; line-height: 1.15; gap: 2px; }
  .clock-box .label {
    color: var(--text-dim); font-size: 0.66rem; text-transform: uppercase;
    letter-spacing: 0.14em; font-weight: 500; font-family: 'JetBrains Mono', monospace;
  }
  .clock-box .big {
    font-family: 'JetBrains Mono', monospace; font-size: 1.15rem; font-weight: 600;
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  }
  .clock-box.real .big { color: var(--text); }
  .clock-box.planned .big { color: var(--text-soft); }
  .clock-box.delta .big.ok { color: var(--green); }
  .clock-box.delta .big.warn { color: var(--warm); }
  .clock-box.delta .big.danger { color: var(--hot); }
  .topbar .grow { flex: 1; }
  .topbar button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-soft);
    padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.83rem; font-family: inherit; font-weight: 500;
    transition: all var(--dur-fast) var(--ease-out);
  }
  .topbar button:hover { background: var(--surface-hover); border-color: var(--border-strong); color: var(--text); }
  .topbar button.primary { background: var(--accent); color: #062420; border-color: var(--accent); font-weight: 600; }
  .topbar button.primary:hover { background: #7df1de; }
  .topbar .slide-counter {
    color: var(--text-muted); font-size: 0.82rem;
    font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
    padding-left: var(--s-2); border-left: 1px solid var(--border);
  }

  /* ===================== MAIN LAYOUT ===================== */
  .main { display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 64px - 56px); }
  .panel-left { overflow-y: auto; padding: var(--s-3) var(--s-4); border-right: 1px solid var(--border); }
  .panel-right { overflow-y: auto; background: var(--bg-1); padding: var(--s-3); }
  .panel-left::-webkit-scrollbar, .panel-right::-webkit-scrollbar { width: 8px; }
  .panel-left::-webkit-scrollbar-track, .panel-right::-webkit-scrollbar-track { background: transparent; }
  .panel-left::-webkit-scrollbar-thumb, .panel-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .panel-left::-webkit-scrollbar-thumb:hover, .panel-right::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* ===================== BOTTOMBAR ===================== */
  .bottombar {
    height: 56px; background: var(--bg-1); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 var(--s-3); gap: var(--s-2); flex-shrink: 0;
  }
  .bottombar button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-soft);
    padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.83rem; font-family: inherit; font-weight: 500;
    transition: all var(--dur-fast) var(--ease-out);
  }
  .bottombar button:hover { background: var(--surface-hover); color: var(--text); }
  .bottombar .progress {
    flex: 1; height: 4px; background: var(--surface); border-radius: 2px;
    overflow: hidden; margin: 0 var(--s-2); border: 1px solid var(--border);
  }
  .bottombar .progress-fill {
    height: 100%; background: var(--accent);
    transition: width var(--dur-med) var(--ease-out);
    box-shadow: 0 0 8px var(--accent-line);
  }

  /* ===================== SLIDE CONTENT ===================== */
  .timing-bar {
    display: flex; align-items: center; gap: var(--s-2); margin-bottom: var(--s-3);
    padding: 12px 16px; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border);
  }
  .timing-bar .time-pill {
    background: var(--accent-soft); color: var(--accent);
    padding: 5px 12px; border-radius: 999px; font-weight: 600; font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
    border: 1px solid var(--accent-line);
  }
  .timing-bar .duration { color: var(--text-muted); font-size: 0.78rem; font-family: 'JetBrains Mono', monospace; }
  .timing-bar .block-title {
    font-weight: 500; flex: 1; font-size: 0.88rem; color: var(--text-soft);
    text-align: right; font-family: 'JetBrains Mono', monospace;
  }

  .slide-tag {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-2);
  }
  .slide-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
  .slide-tag.break::before { background: var(--green); }
  .slide-tag.break { color: var(--green); border-color: var(--green-soft); }
  .slide-tag.demo::before { background: var(--warm); }
  .slide-tag.demo { color: var(--warm); border-color: var(--warm-soft); }
  .slide-tag.exercise::before { background: var(--purple); }
  .slide-tag.exercise { color: var(--purple); border-color: var(--purple-soft); }
  .slide-tag.title::before { background: var(--accent); }
  .slide-tag.title { color: var(--accent); border-color: var(--accent-line); }

  .slide-pane h1 {
    font-size: 1.7rem; font-weight: 700; line-height: 1.15;
    margin-bottom: var(--s-3); letter-spacing: -0.02em; color: var(--text);
  }

  .section {
    background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 16px 18px; margin-bottom: 12px;
    transition: border-color var(--dur-fast) var(--ease-out);
  }
  .section:hover { border-color: var(--border-strong); }
  .section .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .section h3 {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
  }
  .section.say { border-left: 3px solid var(--warm); }
  .section.say h3 { color: var(--warm); }
  .section.do { border-left: 3px solid var(--green); }
  .section.do h3 { color: var(--green); }
  .section.watch { border-left: 3px solid var(--hot); }
  .section.watch h3 { color: var(--hot); }
  .section.note { border-left: 3px solid var(--purple); }
  .section.note h3 { color: var(--purple); }
  .section.prompt-section { border-left: 3px solid var(--accent); }
  .section.prompt-section h3 { color: var(--accent); }
  .section.deeper { border-left: 3px solid #60a5fa; }
  .section.deeper h3 { color: #60a5fa; }
  .section.bridge { border-left: 3px solid #f472b6; }
  .section.bridge h3 { color: #f472b6; }

  .quote {
    color: var(--text); font-size: 1rem; line-height: 1.6;
    padding-left: 12px; border-left: 2px solid var(--warm); margin: 0; font-weight: 400;
  }
  .section p { font-size: 0.94rem; line-height: 1.6; color: var(--text-soft); margin-bottom: 6px; }
  .section p:last-child { margin-bottom: 0; }

  .step-list { counter-reset: step; list-style: none; padding-left: 0; margin: 0; }
  .step-list > li {
    counter-increment: step; padding-left: 36px; position: relative;
    padding-bottom: 10px; font-size: 0.94rem; line-height: 1.55; color: var(--text-soft);
  }
  .step-list > li:last-child { padding-bottom: 0; }
  .step-list > li::before {
    content: counter(step, decimal-leading-zero);
    position: absolute; left: 0; top: 2px; width: 26px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
    font-weight: 600; color: var(--accent); letter-spacing: 0.04em;
  }

  .prompt-box {
    background: #060810; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px 16px; font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem; color: var(--accent); white-space: pre-wrap;
    line-height: 1.6; margin-top: 4px;
  }

  /* ===================== RIGHT PANEL ===================== */
  .right-section { margin-bottom: var(--s-3); }
  .right-section h4 {
    font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
  }
  .preview-card {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 14px; margin-bottom: 8px;
    transition: border-color var(--dur-fast) var(--ease-out);
  }
  .preview-card.next {
    border-color: var(--accent-line);
    background: linear-gradient(180deg, var(--accent-soft), var(--bg-2));
  }
  .preview-card .num {
    font-size: 0.66rem; color: var(--text-dim); letter-spacing: 0.14em;
    font-weight: 600; font-family: 'JetBrains Mono', monospace;
  }
  .preview-card.next .num { color: var(--accent); }
  .preview-card .title { font-size: 0.92rem; font-weight: 500; margin: 4px 0 2px; color: var(--text); line-height: 1.35; }
  .preview-card .when {
    font-size: 0.74rem; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
  }

  .timer-block {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 18px 16px; text-align: center;
    transition: border-color var(--dur-med) var(--ease-out);
  }
  .timer-block.warn { border-color: var(--warm); background: linear-gradient(180deg, var(--warm-soft), var(--bg-2)); }
  .timer-block.danger { border-color: var(--hot); background: linear-gradient(180deg, var(--hot-soft), var(--bg-2)); }
  .timer-display {
    font-family: 'JetBrains Mono', monospace; font-size: 2.4rem; font-weight: 600;
    font-variant-numeric: tabular-nums; color: var(--text);
    line-height: 1; letter-spacing: -0.02em;
    transition: color var(--dur-fast) var(--ease-out);
  }
  .timer-block.warn .timer-display { color: var(--warm); }
  .timer-block.danger .timer-display { color: var(--hot); }
  .timer-label {
    font-size: 0.66rem; color: var(--text-dim); letter-spacing: 0.14em;
    text-transform: uppercase; margin-top: 8px;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
  }
  .timer-controls { display: flex; gap: 4px; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
  .timer-controls button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-soft);
    padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; font-weight: 500;
    transition: all var(--dur-fast) var(--ease-out);
  }
  .timer-controls button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }

  .quick-key { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
  .quick-key kbd {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 6px; font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; color: var(--text-soft); font-weight: 500;
    min-width: 22px; text-align: center; box-shadow: 0 1px 0 var(--border);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="title">Presenter · <span class="accent">GenAI · Session 5</span></span>
  <div class="clock-divider"></div>
  <div class="clock-box real">
    <span class="label">Real clock</span>
    <span class="big" id="realClock">—</span>
  </div>
  <div class="clock-box planned">
    <span class="label">Class time</span>
    <span class="big" id="classClock">0:00 / 2:00</span>
  </div>
  <div class="clock-box delta">
    <span class="label">Pace</span>
    <span class="big ok" id="paceLabel">—</span>
  </div>
  <div class="grow"></div>
  <button id="startBtn" class="primary" onclick="startClass()">▶ Start Class</button>
  <button onclick="resetClass()">↺ Reset</button>
  <button onclick="openLearnerDeck()">↗ Learner Deck</button>
  <span class="slide-counter" id="slideCounter">01 / 29</span>
</div>

<div class="main">
  <div class="panel-left slide-pane" id="slidePane"></div>

  <div class="panel-right">
    <div class="right-section">
      <div class="timer-block" id="timerBlock">
        <div class="timer-display" id="exTimer">00:00</div>
        <div class="timer-label">Exercise timer</div>
        <div class="timer-controls">
          <button onclick="startExTimer(300)">5m</button>
          <button onclick="startExTimer(480)">8m</button>
          <button onclick="startExTimer(600)">10m</button>
          <button onclick="startExTimer(720)">12m</button>
          <button onclick="startExTimer(780)">13m</button>
          <button onclick="startExTimer(1020)">17m</button>
          <button onclick="stopExTimer()">■</button>
        </div>
      </div>
    </div>

    <div class="right-section">
      <h4>Now</h4>
      <div class="preview-card" id="nowCard">
        <div class="num" id="nowNum">—</div>
        <div class="title" id="nowTitle">—</div>
        <div class="when" id="nowWhen">—</div>
      </div>
    </div>

    <div class="right-section">
      <h4>Coming up</h4>
      <div class="preview-card next" id="nextCard">
        <div class="num" id="nextNum">—</div>
        <div class="title" id="nextTitle">—</div>
        <div class="when" id="nextWhen">—</div>
      </div>
      <div class="preview-card" id="next2Card">
        <div class="num" id="next2Num">—</div>
        <div class="title" id="next2Title">—</div>
        <div class="when" id="next2When">—</div>
      </div>
    </div>

    <div class="right-section">
      <h4>Keyboard</h4>
      <div class="quick-key"><kbd>→</kbd> <kbd>␣</kbd> next slide</div>
      <div class="quick-key"><kbd>←</kbd> previous</div>
      <div class="quick-key"><kbd>S</kbd> start / pause class</div>
      <div class="quick-key"><kbd>5</kbd> 5m · <kbd>8</kbd> 8m · <kbd>1</kbd> 13m · <kbd>2</kbd> 17m timer</div>
      <div class="quick-key"><kbd>B</kbd> jump to break (slide 11)</div>
      <div class="quick-key"><kbd>P</kbd> export learner → PDF</div>
      <div class="quick-key"><kbd>End</kbd> last slide</div>
    </div>
  </div>
</div>

<div class="bottombar">
  <button onclick="prev()">← Prev</button>
  <button onclick="next()">Next →</button>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
  <button onclick="goSlide(0)">⏮ First</button>
  <button onclick="goSlide(slides.length - 1)">⏭ Last</button>
</div>

<script>
/* ===================== SLIDE DATA =====================
   Session 5 · Agent Architecture — 29 slides, paired 1:1 to learner_deck.html.
   BREAK_SLIDE_INDEX = 16 (0-based, slide 17 in 1-based numbering).
   ===================================================== */
const BREAK_SLIDE_INDEX = 16;

const slides = [
  {
    num: 1, when: "Pre-start", tag: "title",
    title: "Agent Architecture — How Agents Think, Remember & Act",
    say: "Session 4 gave your agent a brain made of Lumière's own documents. Today we open that brain up and learn exactly how it thinks.",
    doSteps: [
      "Music up. Confirm names as people arrive.",
      "Tabs ready: Lumière Knowledge Agent (Claude Projects), fresh Claude chat for the optional demo, learner workbook open to Exercise A, the updated Lumiere_KB.md (now with branch coupons) in a text editor.",
      "REMIND learners at the top: re-upload the latest Lumiere_KB.md into their Project — it gained a branch-coupons section and Exercise A uses it."
    ],
    bridge: "When the clock starts: one-word check-in, then the Course Story."
  },
  {
    num: 2, when: "0:00 – 0:05", duration: "5 min", tag: "title",
    title: "Opening — One-word check-in + The Course Story",
    say: "Welcome back. Before anything else — type one word in the chat: how did Session 4 land for you? One word.",
    afterPause: "Read every response by name. Then walk the Course Story table one breath per row. Land on S5 last.",
    doSteps: [
      "Read every chat response by name.",
      "Walk the Course Story table: S1 fail → S2 screener → S3 prompts → S4 Lumière → S5 today.",
      "Ask everyone to re-upload the latest Lumiere_KB.md now if they haven't (branch coupons added)."
    ],
    watch: "If chat is silent after 20 sec: 'Any word — useful, dense, wild, broken.'",
    bridge: "Advance to the bug — the hook for the whole session."
  },
  {
    num: 3, when: "0:05 – 0:08", duration: "3 min", tag: "title",
    title: "The Bug We'll Explain — invented LinkedIn URLs",
    say: "Start specific. Your HR Screener from Session 2 — search candidates, extract skills, score them. When the candidate search came back empty, it invented LinkedIn URLs. That was NOT an AI problem. It was an architecture problem — and today you'll name exactly which part failed and why.",
    doSteps: [
      "Show the bug slide (learner slide 3).",
      "Pause after 'architecture problem.' Don't reveal the cause yet — that lands after the anatomy.",
      "Promise: 'by the end you'll know which part was missing, why it caused the hallucination, and how to build it right.'"
    ],
    watch: "If they don't remember the screener: '3-step pipeline — search, extract skills, score. The LinkedIn URL hallucination.'",
    note: "Hold the cause back. Tease it; the anatomy + slide 10 deliver it as a TOOL problem.",
    bridge: "First: the 5 parts every agent is made of."
  },
  {
    num: 4, when: "0:08 – 0:14", duration: "6 min",
    title: "Sprint 1 — Anatomy: 5 Parts, One Brain",
    say: "Every agent — any agent — is 5 parts around one brain. LLM, Memory, Tools, Planner, Executor. Remove any one and it breaks in a specific way.",
    doSteps: [
      "Show the anatomy radial (learner slide 4). Name each part + one-line role; walk the failure column.",
      "Cover norms here if not done: cameras optional, chat open, real break, tool = Claude Projects.",
      "State the One Rule: 'You came in knowing what agents do. You leave knowing how they work.'",
      "Tell them: 'we'll take each of the 5 parts one at a time — then come back to your screener.'"
    ],
    bridge: "Part 1 — the brain.",
    deeper: ["The 5 map to the EdYoda Builder tabs: Overview (LLM), RAG Docs (memory), Configure (tools + planner + executor)."]
  },
  {
    num: 5, when: "0:14 – 0:16", duration: "2 min",
    title: "Part 1 of 5 — LLM (the brain)",
    say: "Part 1: the LLM. The brain — it reads the request, weighs the options, picks the next move. It's the only part that actually thinks. At Lumière, it's what reads a customer's WhatsApp message and works out what they really want. Take it away and there's no reasoning at all — just a fixed script.",
    doSteps: ["Show the LLM component slide (learner slide 5).", "Keep it to ~90 seconds — one part, one breath."],
    bridge: "Part 2 — what it knows."
  },
  {
    num: 6, when: "0:16 – 0:18", duration: "2 min",
    title: "Part 2 of 5 — Memory (what it knows)",
    say: "Part 2: Memory. What it holds and recalls — the current chat, a returning customer's history, and a log of what it's already done so it doesn't repeat itself. At Lumière: 'your usual red velvet, like last month?' — and the log that stops a monitor re-alerting on a rule it saw yesterday. Take it away and it forgets every session.",
    doSteps: ["Show the Memory component slide (learner slide 6).", "Foreshadow: 'hold onto memory — it comes back in the FSSAI monitor.'"],
    bridge: "Part 3 — what it can do."
  },
  {
    num: 7, when: "0:18 – 0:20", duration: "2 min",

/* ===================== ENGINE ===================== */
let current = 0;
const MASTER_KEY = 'genai_s5_slide_master';
const PRINT_KEY  = 'genai_s5_print_request';

function goSlide(i) {
  current = Math.max(0, Math.min(slides.length - 1, i));
  render();
  try { localStorage.setItem(MASTER_KEY, String(current)); } catch(e) {}
  if (slides[current].tag === 'break') startExTimer(600);
}
function next() { if (current < slides.length - 1) goSlide(current + 1); }
function prev() { if (current > 0) goSlide(current - 1); }

function render() {
  const s = slides[current];
  const pane = document.getElementById('slidePane');
  const tag = s.tag || '';
  let html = '';

  if (s.when) {
    html += `<div class="timing-bar">
      <span class="time-pill">${s.when}</span>
      ${s.duration ? `<span class="duration">${s.duration}</span>` : ''}
      <span class="block-title">Slide ${s.num} of ${slides.length}</span>
    </div>`;
  }
  if (tag) html += `<div class="slide-tag ${tag}">${tag}</div>`;
  html += `<h1>${s.title}</h1>`;

  if (s.say) html += `<div class="section say"><div class="header"><h3>Say</h3></div><blockquote class="quote">${s.say}</blockquote></div>`;
  if (s.afterPause) html += `<div class="section say"><div class="header"><h3>After pause</h3></div><p>${s.afterPause}</p></div>`;
  if (s.sayAfter) html += `<div class="section say"><div class="header"><h3>Say after</h3></div><p>${s.sayAfter}</p></div>`;

  if (s.doSteps && s.doSteps.length) {
    const items = s.doSteps.map(d => `<li>${d}</li>`).join('');
    html += `<div class="section do"><div class="header"><h3>Do</h3></div><ul class="step-list">${items}</ul></div>`;
  }

  if (s.watch) html += `<div class="section watch"><div class="header"><h3>Watch</h3></div><p>${s.watch}</p></div>`;
  if (s.note)  html += `<div class="section note"><div class="header"><h3>Note</h3></div><p>${s.note}</p></div>`;
  if (s.bridge) html += `<div class="section bridge"><div class="header"><h3>Bridge →</h3></div><p>${s.bridge}</p></div>`;
  if (s.deeper && s.deeper.length) {
    const items = s.deeper.map(d => `<li>${d}</li>`).join('');
    html += `<div class="section deeper"><div class="header"><h3>Deeper (if asked)</h3></div><ul class="step-list">${items}</ul></div>`;
  }
  if (s.prompt) html += `<div class="section prompt-section"><div class="header"><h3>Paste in chat</h3></div><div class="prompt-box">${s.prompt}</div></div>`;

  pane.innerHTML = html;

  // Update counters and previews
  document.getElementById('slideCounter').textContent = `${String(s.num).padStart(2,'0')} / ${slides.length}`;
  document.getElementById('progressFill').style.width = `${((current + 1) / slides.length) * 100}%`;

  const np = (i) => slides[i] || null;
  const now = np(current), nx = np(current + 1), nx2 = np(current + 2);
  if (now) { document.getElementById('nowNum').textContent = `Slide ${now.num}`; document.getElementById('nowTitle').textContent = now.title; document.getElementById('nowWhen').textContent = now.when || '—'; }
  if (nx)  { document.getElementById('nextNum').textContent = `Slide ${nx.num}`;  document.getElementById('nextTitle').textContent = nx.title;  document.getElementById('nextWhen').textContent = nx.when || '—'; }
  else     { document.getElementById('nextNum').textContent = '—'; document.getElementById('nextTitle').textContent = '—'; document.getElementById('nextWhen').textContent = '—'; }
  if (nx2) { document.getElementById('next2Num').textContent = `Slide ${nx2.num}`; document.getElementById('next2Title').textContent = nx2.title; document.getElementById('next2When').textContent = nx2.when || '—'; }
  else     { document.getElementById('next2Num').textContent = '—'; document.getElementById('next2Title').textContent = '—'; document.getElementById('next2When').textContent = '—'; }
}

/* ===================== REAL CLOCK ===================== */
function updateRealClock() {
  const now = new Date();
  document.getElementById('realClock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
setInterval(updateRealClock, 1000);
updateRealClock();

/* ===================== CLASS TIMER ===================== */
let classStart = null, classPaused = true, classInterval = null;
function startClass() {
  if (classPaused) {
    if (!classStart) classStart = Date.now();
    else classStart = Date.now() - (classStart > 0 ? Date.now() - classStart : 0);
    classPaused = false;
    document.getElementById('startBtn').textContent = '⏸ Pause';
    classInterval = setInterval(tickClass, 1000);
  } else {
    classPaused = true;
    clearInterval(classInterval);
    document.getElementById('startBtn').textContent = '▶ Resume';
  }
}
function resetClass() {
  classPaused = true; clearInterval(classInterval); classStart = null;
  document.getElementById('classClock').textContent = '0:00 / 2:00';
  document.getElementById('paceLabel').textContent = '—';
  document.getElementById('paceLabel').className = 'big';
  document.getElementById('startBtn').textContent = '▶ Start Class';
}
function tickClass() {
  if (!classStart) return;
  const elapsed = Math.floor((Date.now() - classStart) / 1000);
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  document.getElementById('classClock').textContent =
    `${m}:${String(s).padStart(2,'0')} / 2:00`;
  const target = slides[current].when ? parseWhen(slides[current].when) : null;
  if (target !== null) {
    const diff = elapsed - target;
    const label = document.getElementById('paceLabel');
    if (diff > 180) { label.textContent = `+${Math.floor(diff/60)}m late`; label.className = 'big danger'; }
    else if (diff > 60) { label.textContent = `+${diff}s`; label.className = 'big warn'; }
    else { label.textContent = 'on time'; label.className = 'big ok'; }
  }
}
function parseWhen(w) {
  const m = w.match(/(\d+):(\d+)/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

/* ===================== EXERCISE TIMER ===================== */
let exInterval = null, exRemaining = 0;
function startExTimer(secs) {
  stopExTimer();
  exRemaining = secs;
  function tick() {
    const m = Math.floor(exRemaining / 60), s = exRemaining % 60;
    document.getElementById('exTimer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const b = document.getElementById('timerBlock');
    b.classList.toggle('warn', exRemaining <= 120 && exRemaining > 30);
    b.classList.toggle('danger', exRemaining <= 30);
    exRemaining--;
    if (exRemaining < 0) { stopExTimer(); document.getElementById('exTimer').textContent = '00:00'; }
  }
  tick();
  exInterval = setInterval(tick, 1000);
}
function stopExTimer() {
  if (exInterval) { clearInterval(exInterval); exInterval = null; }
  document.getElementById('timerBlock').classList.remove('warn', 'danger');
}

/* ===================== KEYBOARD ===================== */
document.addEventListener('keydown', (e) => {
  if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); next(); }
  if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); prev(); }
  if (e.key === 'Home') goSlide(0);
  if (e.key === 'End') goSlide(slides.length - 1);
  if (e.key === 's' || e.key === 'S') startClass();
  if (e.key === 'b' || e.key === 'B') goSlide(BREAK_SLIDE_INDEX);
  if (e.key === '5') startExTimer(300);
  if (e.key === '8') startExTimer(480);
  if (e.key === '1') startExTimer(780);  // 13m
  if (e.key === '2') startExTimer(1020); // 17m
  if (e.key === 'p' || e.key === 'P') printLearnerDeck();
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

/* ===================== LEARNER DECK CONTROL ===================== */
let learnerWin = null;
function openLearnerDeck() {
  const url = 'learner_deck.html';
  if (!learnerWin || learnerWin.closed) {
    learnerWin = window.open(url, 'genai_s5_learner');
  } else {
    learnerWin.focus();
  }
}

// Override goSlide to also push to learner deck via localStorage
const _goSlide = goSlide;
window.goSlide = function(i) {
  _goSlide(i);
  try { localStorage.setItem(MASTER_KEY, String(current)); } catch(e) {}
};

function printLearnerDeck() {
  if (!learnerWin || learnerWin.closed) {
    learnerWin = window.open('learner_deck.html', 'genai_s5_learner');
    setTimeout(() => { try { localStorage.setItem(PRINT_KEY, Date.now().toString()); } catch(e) {} }, 1500);
  } else {
    try { localStorage.setItem(PRINT_KEY, Date.now().toString()); } catch(e) {}
  }
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

// Init
goSlide(0);
</script>
